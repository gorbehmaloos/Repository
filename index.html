<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دیده‌بان بازار نسخه جدید</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>دیده‌بان بازار</h1>


<div class="toolbar">


<div class="stats">

<span>
کل نمادها:
<b id="totalCount">0</b>
</span>


<span class="green">
مثبت:
<b id="positiveCount">0</b>
</span>


<span class="red">
منفی:
<b id="negativeCount">0</b>
</span>


</div>



<div class="search-box">

<input 
id="searchInput" 
type="text" 
placeholder="جستجوی نماد یا نام شرکت..."
>


</div>


</div>


</header>



<section id="searchResultSection">

<h3>نتایج جستجو</h3>

<div class="table-container">

<table id="searchTable"></table>

</div>

</section>




<section>

<h3>کل بازار</h3>

<div class="table-container">

<table id="marketTable"></table>

</div>

</section>




<script src="script.js"></script>


</body>

</html>
