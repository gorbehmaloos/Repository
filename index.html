<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>داده زنده بازار</title>

<style>
table {
    border-collapse: collapse;
    width: 100%;
}
td, th {
    border: 1px solid #999;
    padding: 8px;
}
</style>

</head>

<body>

<h1>داده Google Sheet</h1>

<table id="data"></table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRULrojEZLgtKk-T0DkFu0fJlXZoWystL0wYlDEwv78YIN1Q-1HmEMQny8lSYBITNPMHp-3Ym638D_y/pub?output=csv";

fetch(url)
.then(response => response.text())
.then(csv => {

    let rows = csv.split("\n");

    let table = document.getElementById("data");

    rows.forEach((row, index) => {

        let tr = document.createElement("tr");

        row.split(",").forEach(cell => {

            let element = index === 0 ? document.createElement("th") : document.createElement("td");

            element.innerText = cell;
            tr.appendChild(element);

        });

        table.appendChild(tr);

    });

});

</script>

</body>
</html>
