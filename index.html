<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<title>داده زنده بازار</title>

<style>

body {
    direction: rtl;
    font-family: Tahoma, Arial;
    margin: 20px;
}

h1 {
    text-align: center;
}


.table-container {
    overflow-x: auto;
    overflow-y: auto;
    max-width: 100%;
    max-height: 80vh;
    border: 1px solid #999;
}


table {
    border-collapse: collapse;
    min-width: 2500px;
}


td, th {
    border: 1px solid #999;
    padding: 8px;
    text-align: center;
    white-space: nowrap;
    background: white;
}


th {
    background-color: #eeeeee;
    position: sticky;
    top: 0;
    z-index: 3;
}


/* ثابت کردن ستون نماد */

td:first-child,
th:first-child {

    position: sticky;
    right: 0;
    z-index: 2;
    background: white;

}


th:first-child {

    z-index: 5;
    background-color: #eeeeee;

}



.positive {

    color: green;
    font-weight: bold;

}


.negative {

    color: red;
    font-weight: bold;

}


</style>

</head>


<body>


<h1>داده Google Sheet</h1>


<div class="table-container">

<table id="data"></table>

</div>



<script>


const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRULrojEZLgtKk-T0DkFu0fJlXZoWystL0wYlDEwv78YIN1Q-1HmEMQny8lSYBITNPMHp-3Ym638D_y/pub?output=csv";



fetch(url)

.then(response => response.text())

.then(csv => {


let rows = csv.split("\n");


// پیدا کردن Header واقعی

let headerIndex = rows.findIndex(row => row.includes("نماد"));


if(headerIndex === -1){

alert("Header پیدا نشد");

return;

}


// حذف ردیف‌های قبل از Header

rows = rows.slice(headerIndex);



let table = document.getElementById("data");



rows.forEach((row,index)=>{


let tr = document.createElement("tr");


let cells = row.split(",");



cells.forEach((cell,col)=>{


let element;


if(index===0){

element=document.createElement("th");

}
else{

element=document.createElement("td");

}



cell = cell.replace(/"/g,"").trim();


element.innerText = cell;



// ستون درصد آخرین معامله

if(index>0 && col===9){


let value = parseFloat(cell);


if(value > 0){

element.classList.add("positive");

}


if(value < 0){

element.classList.add("negative");

}


}



tr.appendChild(element);


});



table.appendChild(tr);



});


})


.catch(error=>{

console.log(error);

});



</script>


</body>

</html>
